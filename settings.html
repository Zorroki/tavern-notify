<div class="tavernNotify_settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>酒馆后台通知</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <p class="tavernNotify_hint">
                将单聊里的普通回复和重新生成转为后台任务，等你回到页面后再自动同步回当前聊天。
            </p>

            <label class="checkbox_label" for="tavern_notify_enabled">
                <input id="tavern_notify_enabled" type="checkbox" />
                <span>启用单聊后台接管</span>
            </label>

            <div class="tavernNotify_row">
                <strong>插件状态</strong>
                <span id="tavern_notify_status" class="tavernNotify_status">检测中...</span>
                <button id="tavern_notify_probe" class="menu_button">检测插件</button>
            </div>

            <div class="tavernNotify_grid">
                <label for="tavern_notify_bark_server">Bark 服务地址</label>
                <input id="tavern_notify_bark_server" class="text_pole" type="text" placeholder="https://api.day.app" />

                <label for="tavern_notify_bark_device">Bark Device Key</label>
                <input id="tavern_notify_bark_device" class="text_pole" type="text" placeholder="xxxxxxxxxxxx" />

                <label for="tavern_notify_bark_group">Bark 分组</label>
                <input id="tavern_notify_bark_group" class="text_pole" type="text" placeholder="SillyTavern" />

                <label for="tavern_notify_bark_sound">Bark 提示音</label>
                <input id="tavern_notify_bark_sound" class="text_pole" type="text" placeholder="bell" />

                <label for="tavern_notify_title_prefix">通知标题</label>
                <input id="tavern_notify_title_prefix" class="text_pole" type="text" placeholder="酒馆后台通知" />
            </div>

            <label class="checkbox_label" for="tavern_notify_open_url">
                <input id="tavern_notify_open_url" type="checkbox" />
                <span>点击 Bark 通知时打开当前 SillyTavern 页面</span>
            </label>

            <div class="tavernNotify_actions">
                <button id="tavern_notify_test" class="menu_button">发送 Bark 测试通知</button>
            </div>

            <p class="tavernNotify_hint">
                当前接管单角色聊天中的普通回复和重新生成。群聊、重抽、继续生成、扮演等流程仍然走 SillyTavern 原生逻辑。Bark 只发送状态通知，不展示回复正文。
            </p>
        </div>
    </div>
</div>
